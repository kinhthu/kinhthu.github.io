# ==============================================================================
# DEPLOYMENT MODE A: Deploy from gh-pages branch (Classic / Traditional)
# ==============================================================================
# This workflow builds your Next.js application and pushes the compiled static
# HTML files (from the './out' directory) to a separate 'gh-pages' branch.
#
# GitHub Pages must be configured in your repository settings:
# Settings -> Pages -> Build and deployment -> Source: "Deploy from a branch"
# and select the branch "gh-pages" (Folder: / (root)).
#
# NOTE: To avoid conflicts and duplicate runs, only ONE deployment workflow
# (deploy.yml OR nextjs.yml) should have active 'push' triggers.
# By default, both are kept enabled with dispatch triggers, but if you choose
# Mode B (GitHub Actions), you should disable/comment out the push trigger in this file.
# ==============================================================================

name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write # Required for peaceiris/actions-gh-pages to push to gh-pages branch

concurrency:
  group: "pages-deploy-classic"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          cname: "" # Clean cname to default to username.github.io

